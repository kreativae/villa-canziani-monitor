services:
  - type: web
    name: villa-canziani-monitor
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: PLAYWRIGHT_ENABLED
        value: false
      - key: CORS_ORIGINS
        value: '["https://villa-canziani-monitor.vercel.app","http://localhost:3000"]'
    healthCheckPath: /health
