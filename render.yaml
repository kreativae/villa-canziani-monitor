services:
  - type: web
    name: villa-canziani-monitor-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: PLAYWRIGHT_ENABLED
        value: "false"
      - key: CORS_ORIGINS
        value: '["https://villa-canziani-monitor.vercel.app","http://localhost:3000"]'
    healthCheckPath: /health
